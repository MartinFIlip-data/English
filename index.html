<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anglický Quiz — Pracovná Angličtina</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273549;
    --border: #334155;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header span { background: var(--accent); color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }

  nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
  nav button { background: none; border: none; color: var(--muted); padding: 14px 20px; font-size: 0.9rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav button:hover:not(.active) { color: var(--text); }

  .controls { padding: 16px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); }
  .controls input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: var(--radius); font-size: 0.9rem; width: 220px; outline: none; }
  .controls input:focus { border-color: var(--accent); }
  .controls select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: var(--radius); font-size: 0.9rem; outline: none; cursor: pointer; }
  .controls .count { margin-left: auto; color: var(--muted); font-size: 0.85rem; }

  main { padding: 24px; }

  /* CARDS */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: border-color 0.2s, transform 0.1s; user-select: none; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card .sk { font-size: 0.95rem; font-weight: 500; margin-bottom: 10px; }
  .card .cat { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .card .en { font-size: 0.9rem; color: var(--green); display: none; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
  .card.open .en { display: block; }
  .card .hint { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
  .card.open .hint { display: none; }

  /* QUIZ */
  #quiz-section { max-width: 680px; margin: 0 auto; }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .quiz-header .score-box { display: flex; gap: 20px; }
  .score-item { text-align: center; }
  .score-item .val { font-size: 1.5rem; font-weight: 700; }
  .score-item .lbl { font-size: 0.75rem; color: var(--muted); }
  .score-item.correct .val { color: var(--green); }
  .score-item.wrong .val { color: var(--red); }
  .score-item.total .val { color: var(--accent); }

  .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .quiz-card .qtype { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .quiz-card .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
  .quiz-card .qcat { font-size: 0.8rem; color: var(--muted); }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 22px; }
  .opt { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; font-size: 0.9rem; transition: all 0.15s; text-align: left; color: var(--text); }
  .opt:hover:not(:disabled) { border-color: var(--accent); }
  .opt.correct { border-color: var(--green); background: rgba(34,197,94,0.1); color: var(--green); }
  .opt.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); color: var(--red); }
  .opt:disabled { cursor: default; }

  .quiz-feedback { padding: 12px 16px; border-radius: var(--radius); font-size: 0.9rem; margin-top: 14px; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(34,197,94,0.15); border: 1px solid var(--green); color: var(--green); }
  .quiz-feedback.fail { background: rgba(239,68,68,0.15); border: 1px solid var(--red); color: var(--red); }

  .btn { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: var(--radius); font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

  .quiz-cat-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .quiz-cat-select button { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 99px; font-size: 0.8rem; cursor: pointer; }
  .quiz-cat-select button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .progress-bar { background: var(--border); border-radius: 99px; height: 4px; margin-bottom: 20px; }
  .progress-fill { background: var(--accent); height: 4px; border-radius: 99px; transition: width 0.3s; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }

  .tab-section { display: none; }
  .tab-section.active { display: block; }

  @media (max-width: 600px) {
    .options { grid-template-columns: 1fr; }
    .controls { flex-direction: column; align-items: stretch; }
    .controls input, .controls select { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>🇬🇧 Anglický Quiz</h1>
  <span>Pracovná Angličtina</span>
</header>

<nav>
  <button class="active" onclick="switchTab('slovicka')">Slovíčka</button>
  <button onclick="switchTab('vety')">Vety</button>
  <button onclick="switchTab('kviz')">Kvíz</button>
</nav>

<div id="slovicka-section" class="tab-section active">
  <div class="controls">
    <input type="text" id="voc-search" placeholder="Hľadaj slovíčko..." oninput="renderVocab()">
    <select id="voc-cat" onchange="renderVocab()">
      <option value="">Všetky kategórie</option>
    </select>
    <span class="count" id="voc-count"></span>
  </div>
  <main><div class="grid" id="voc-grid"></div></main>
</div>

<div id="vety-section" class="tab-section">
  <div class="controls">
    <input type="text" id="sen-search" placeholder="Hľadaj vetu..." oninput="renderSentences()">
    <select id="sen-cat" onchange="renderSentences()">
      <option value="">Všetky kategórie</option>
    </select>
    <span class="count" id="sen-count"></span>
  </div>
  <main><div class="grid" id="sen-grid"></div></main>
</div>

<div id="kviz-section" class="tab-section">
  <main>
    <div id="quiz-section">
      <div class="quiz-header">
        <div>
          <div style="font-size:1.1rem;font-weight:700">Kvíz</div>
          <div style="font-size:0.8rem;color:var(--muted)" id="quiz-mode-label">Zmiešané slovíčka a vety</div>
        </div>
        <div class="score-box">
          <div class="score-item correct"><div class="val" id="score-ok">0</div><div class="lbl">Správne</div></div>
          <div class="score-item wrong"><div class="val" id="score-fail">0</div><div class="lbl">Chyby</div></div>
          <div class="score-item total"><div class="val" id="score-total">0</div><div class="lbl">Celkom</div></div>
        </div>
      </div>

      <div class="quiz-cat-select" id="quiz-cats"></div>

      <div class="progress-bar"><div class="progress-fill" id="quiz-progress" style="width:0%"></div></div>

      <div class="quiz-card">
        <div class="qtype" id="q-type">Prelož do angličtiny</div>
        <div class="question" id="q-text">—</div>
        <div class="qcat" id="q-cat"></div>
        <div class="options" id="q-options"></div>
        <div class="quiz-feedback" id="q-feedback"></div>
        <div class="btn-row">
          <button class="btn secondary" onclick="skipQuestion()">Preskočiť</button>
          <button class="btn" id="next-btn" onclick="nextQuestion()" style="display:none">Ďalšia →</button>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn secondary" onclick="resetScore()">Resetovať skóre</button>
        <button class="btn secondary" onclick="toggleQuizMode()">Zmeniť smer</button>
      </div>
      <div style="text-align:center;margin-top:8px;font-size:0.8rem;color:var(--muted)" id="quiz-dir-label">SK → EN</div>
    </div>
  </main>
</div>

let currentTab = 'slovicka';
let quizItems = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizWrong = 0;

let selectedQuizCats = new Set(['all']);

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + '-section').classList.add('active');
  document.querySelectorAll('nav button')[['slovicka','vety','kviz'].indexOf(tab)].classList.add('active');
  if (tab === 'kviz') initQuiz();
}

// ============================================================
function populateCatSelect(selectId, items) {
  const sel = document.getElementById(selectId);
  const cats = [...new Set(items.map(i => i.cat))].sort();
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function renderVocab() {
  const q = document.getElementById('voc-search').value.toLowerCase();
  const cat = document.getElementById('voc-cat').value;
  const filtered = VOCAB.filter(v =>
    (!cat || v.cat === cat) &&
    (!q || v.sk.toLowerCase().includes(q) || v.en.toLowerCase().includes(q))
  );
  document.getElementById('voc-count').textContent = filtered.length + ' slovíčok';
  const grid = document.getElementById('voc-grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty">Žiadne výsledky</div>'; return; }
  grid.innerHTML = filtered.map(v => `
    <div class="card" onclick="this.classList.toggle('open')">
      <div class="cat">${v.cat}</div>
      <div class="sk">${v.sk}</div>
      <div class="en">${v.en}</div>
      <div class="hint">👆 Klikni pre preklad</div>
    </div>`).join('');
}

// ============================================================
// QUIZ
// ============================================================
function buildQuizCatButtons() {
  const allItems = [...VOCAB, ...SENTENCES];
  const cats = [...new Set(allItems.map(i => i.cat))].sort();
  const container = document.getElementById('quiz-cats');
  container.innerHTML = `<button class="active" onclick="toggleQuizCat('all',this)">Všetko</button>` +
    cats.map(c => `<button onclick="toggleQuizCat('${c}',this)">${c}</button>`).join('');
}

function toggleQuizCat(cat, btn) {
  if (cat === 'all') {
    selectedQuizCats = new Set(['all']);
    document.querySelectorAll('#quiz-cats button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } else {
    selectedQuizCats.delete('all');
    document.querySelector('#quiz-cats button').classList.remove('active');
    if (selectedQuizCats.has(cat)) {
      selectedQuizCats.delete(cat);
      btn.classList.remove('active');
    } else {
      selectedQuizCats.add(cat);
      btn.classList.add('active');
    }
    if (selectedQuizCats.size === 0) {
      selectedQuizCats.add('all');
      document.querySelector('#quiz-cats button').classList.add('active');
    }
  }
  loadQuizItems();
  nextQuestion();
}

function loadQuizItems() {
  const all = [...VOCAB, ...SENTENCES];
  if (selectedQuizCats.has('all')) {
    quizItems = shuffle([...all]);
  } else {
    quizItems = shuffle(all.filter(i => selectedQuizCats.has(i.cat)));
  }
  quizIndex = 0;
}

function initQuiz() {
  buildQuizCatButtons();
  loadQuizItems();
  nextQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getWrongOptions(correct, pool, isVocab) {
  const pool2 = pool.filter(p => {
    const ans = quizReverse ? p.sk : p.en;
    return ans !== correct;
  });
  return shuffle(pool2).slice(0, 3).map(p => quizReverse ? p.sk : p.en);
}

function nextQuestion() {
  if (quizIndex >= quizItems.length) {
    loadQuizItems();
  }
  const item = quizItems[quizIndex % quizItems.length];
  quizIndex++;
  quizAnswered = false;

  const question = quizReverse ? item.en : item.sk;
  const answer = quizReverse ? item.sk : item.en;

  document.getElementById('q-type').textContent = quizReverse ? 'Prelož do slovenčiny' : 'Prelož do angličtiny';
  document.getElementById('q-text').textContent = question;
  document.getElementById('q-cat').textContent = '📂 ' + item.cat;
  document.getElementById('next-btn').style.display = 'none';

  const feedback = document.getElementById('q-feedback');
  feedback.className = 'quiz-feedback';
  feedback.textContent = '';

  // build options
  const pool = [...VOCAB, ...SENTENCES];
  const wrongs = getWrongOptions(answer, pool, false);
  const options = shuffle([answer, ...wrongs]);

  const optDiv = document.getElementById('q-options');
  optDiv.innerHTML = options.map(o => `
    <button class="opt" onclick="checkAnswer(this, '${CSS.escape(o)}', '${CSS.escape(answer)}')">${o}</button>
  `).join('');

  const total = quizCorrect + quizWrong;
  const pct = total === 0 ? 0 : Math.round((quizCorrect / total) * 100);
  document.getElementById('quiz-progress').style.width = pct + '%';
}

function CSS_unescape(s) { return s; }

function checkAnswer(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;

  // decode escaped values
  const chosenText = btn.textContent.trim();
  const correctText = document.querySelector('.opt:not(.wrong)') ? correct : correct;

  // find all buttons
  const allOpts = document.querySelectorAll('.opt');
  allOpts.forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === unescape(correct)) {
      b.classList.add('correct');
    }
  });

  const isCorrect = chosenText === unescape(correct);
  if (isCorrect) {
    quizCorrect++;
    showFeedback(true, '✅ Správne!');
    btn.classList.add('correct');
  } else {
    quizWrong++;
    showFeedback(false, '❌ Nesprávne. Správna odpoveď: ' + unescape(correct));
    btn.classList.add('wrong');
  }

  document.getElementById('score-ok').textContent = quizCorrect;
  document.getElementById('score-fail').textContent = quizWrong;
  document.getElementById('score-total').textContent = quizCorrect + quizWrong;
  document.getElementById('next-btn').style.display = 'inline-block';
}

function unescape(s) {
  const el = document.createElement('textarea');
  el.innerHTML = s;
  return el.value;
}

function showFeedback(ok, msg) {
  const fb = document.getElementById('q-feedback');
  fb.textContent = msg;
  fb.className = 'quiz-feedback show ' + (ok ? 'ok' : 'fail');
}

function skipQuestion() {
  nextQuestion();
}

function resetScore() {
  quizCorrect = 0;
  quizWrong = 0;
  document.getElementById('score-ok').textContent = 0;
  document.getElementById('score-fail').textContent = 0;
  document.getElementById('score-total').textContent = 0;
  loadQuizItems();
  nextQuestion();
}

function toggleQuizMode() {
  quizReverse = !quizReverse;
  document.getElementById('quiz-dir-label').textContent = quizReverse ? 'EN → SK' : 'SK → EN';
  nextQuestion();
}

// ============================================================
// INIT
// ============================================================
populateCatSelect('voc-cat', VOCAB);
populateCatSelect('sen-cat', SENTENCES);
renderVocab();
renderSentences();
</script>
